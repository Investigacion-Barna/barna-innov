<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Pruebas · evaluación de perfiles</title>
<style>
  body { font-family: monospace; padding: 20px; max-width: 1000px; margin: 0 auto; }
  table { border-collapse: collapse; width: 100%; }
  th, td { border: 1px solid #ccc; padding: 6px 10px; text-align: left; font-size: 13px; }
  th { background: #f0f0f0; }
  .pass { color: #2f7d4f; font-weight: bold; }
  .fail { color: #b54040; font-weight: bold; }
  .summary { margin: 20px 0; padding: 12px; background: #f7f7f5; border-radius: 6px; }
</style>
</head>
<body>
<h1>Pruebas de evaluación de perfiles</h1>
<div id="summary" class="summary"></div>
<table id="results">
  <thead><tr><th>#</th><th>Caso</th><th>Esperado</th><th>Obtenido</th><th>Status</th></tr></thead>
  <tbody></tbody>
</table>

<script src="profiles.js"></script>
<script>
// Helper: construye un mapa de promedios desde niveles deseados.
// 'A'/'M'/'B' -> 4.2 / 3.0 / 2.0  (centrados respecto a los umbrales).
function p(levels) {
  const map = { A: 4.2, M: 3.0, B: 2.0 };
  const o = {};
  for (const k of Object.keys(levels)) o[k] = map[levels[k]];
  return o;
}

const cases = [
  // 1. Cultura de innovación abierta
  ['Cultura de innovación abierta',
   p({D1:'A',D2:'A',D3:'A',D4:'M',D5:'M',D6:'M',D7:'A',D8:'A'}),
   'Cultura de innovación abierta'],

  // 2. Aprendizaje distribuido incipiente
  ['Aprendizaje distribuido incipiente',
   p({D1:'M',D2:'A',D3:'M',D4:'M',D5:'M',D6:'A',D7:'M',D8:'M'}),
   'Aprendizaje distribuido incipiente'],

  // 3. Burocracia innovadora
  ['Burocracia innovadora',
   p({D1:'M',D2:'M',D3:'A',D4:'B',D5:'B',D6:'M',D7:'M',D8:'M'}),
   'Burocracia innovadora'],

  // 4. Innovación centralizada y frágil
  ['Innovación centralizada y frágil',
   p({D1:'M',D2:'B',D3:'M',D4:'M',D5:'M',D6:'M',D7:'B',D8:'A'}),
   'Innovación centralizada y frágil'],

  // 5. Cultura reactiva de urgencia
  ['Cultura reactiva de urgencia',
   p({D1:'B',D2:'M',D3:'M',D4:'B',D5:'B',D6:'M',D7:'M',D8:'M'}),
   'Cultura reactiva de urgencia'],

  // 6. Fallback: todo medio
  ['Fallback — todo medio',
   p({D1:'M',D2:'M',D3:'M',D4:'M',D5:'M',D6:'M',D7:'M',D8:'M'}),
   'Perfil mixto / en transición'],

  // 7. Fallback: combinaciones que antes eran "mixtos" ahora caen al fallback
  ['Fallback — antes "presión operativa" (D1·D2·D3·D7·D8 Alto + D4 Bajo)',
   p({D1:'A',D2:'A',D3:'A',D4:'B',D5:'A',D6:'A',D7:'A',D8:'A'}),
   'Cultura de innovación abierta'],  // sigue siendo abierta porque las 5 dims clave son Alto

  ['Fallback — antes "rezago digital" (D1·D2·D7·D8 Alto + D6 Bajo, D3 Medio)',
   p({D1:'A',D2:'A',D3:'M',D4:'M',D5:'M',D6:'B',D7:'A',D8:'A'}),
   'Perfil mixto / en transición'],

  ['Fallback — antes "reactiva basada en datos" (D4 Bajo + D3 Alto, D1 Medio)',
   p({D1:'M',D2:'M',D3:'A',D4:'B',D5:'M',D6:'M',D7:'M',D8:'M'}),
   'Perfil mixto / en transición'],

  // Casos límite de umbrales
  ['Umbral 2.5 → Medio (no Bajo)',
    { D1: 2.5, D2: 2.5, D3: 2.5, D4: 2.5, D5: 2.5, D6: 2.5, D7: 2.5, D8: 2.5 },
    'Perfil mixto / en transición'],

  ['Umbral 3.75 → Alto en todos → Cultura abierta',
    { D1: 3.75, D2: 3.75, D3: 3.75, D4: 3.75, D5: 3.75, D6: 3.75, D7: 3.75, D8: 3.75 },
    'Cultura de innovación abierta'],
];

const tbody = document.querySelector('#results tbody');
let pass = 0, fail = 0;
cases.forEach((c, i) => {
  const [name, scores, expected] = c;
  const result = window.PROFILES.evaluar(scores);
  const got = result.perfil.nombre;
  const ok = got === expected;
  if (ok) pass++; else fail++;
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td>${i + 1}</td>
    <td>${name}</td>
    <td>${expected}</td>
    <td>${got}</td>
    <td class="${ok ? 'pass' : 'fail'}">${ok ? 'PASS' : 'FAIL'}</td>`;
  tbody.appendChild(tr);
});
document.getElementById('summary').innerHTML =
  `<strong>${pass} / ${cases.length} casos pasan.</strong> ${fail ? `<span class="fail">${fail} fallos.</span>` : '✓ Todos verdes.'}`;
</script>
</body>
</html>
